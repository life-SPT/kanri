<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>作業・出欠管理表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;font-size:13px;background:#f5f5f5;}

.holiday-banner{background:#FAEEDA;color:#854F0B;border-radius:6px;padding:5px 10px;font-size:11px;margin-bottom:0.5rem;display:none;}
.stats{display:flex;gap:6px;margin-bottom:0.5rem;flex-wrap:wrap;}

.lg{display:flex;align-items:center;gap:3px;font-size:10px;color:#666;}
.lgd{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.tbl-wrap{border:0.5px solid #ddd;border-radius:10px;overflow:hidden;background:#fff;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
col.c-no{width:22px;}col.c-name{width:auto;}col.c-st{width:50px;}col.c-am{width:82px;}col.c-pm{width:82px;}
thead th{background:#f0f0f0;font-size:10px;font-weight:500;padding:4px 3px;text-align:center;border-bottom:0.5px solid #ddd;color:#666;white-space:nowrap;}
th.th-name{text-align:left;padding-left:6px;}

tbody tr.row-abs td{opacity:0.45;}
td{padding:3px 3px;text-align:center;vertical-align:middle;overflow:hidden;}
td.td-no{font-size:10px;color:#bbb;}

.status-badge{font-size:10px;padding:2px 4px;border-radius:8px;display:inline-block;white-space:nowrap;}
tr.divider td{background:#f5f5f5;font-size:10px;color:#999;padding:3px 6px;text-align:left;font-weight:500;border-bottom:0.5px solid #ddd;}

/* 名前横の作業色ドット */
.work-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:4px;vertical-align:middle;flex-shrink:0;}

.modal{background:#fff;border-radius:12px;padding:1rem;width:300px;max-width:95vw;border:0.5px solid #ddd;margin-bottom:40px;}

.hu-info{font-size:11px;color:#666;line-height:1.5;}

.hu-btn:disabled{opacity:0.5;cursor:not-allowed;}
.hu-status{font-size:10px;margin-top:5px;color:#666;}
.hu-status.ok{color:#3B6D11;}.hu-status.err{color:#A32D2D;}.hu-status.loading{color:#854F0B;}
.insert-pos{display:flex;align-items:center;gap:6px;margin-bottom:0.4rem;}

.insert-pos select{font-size:11px;padding:3px 5px;border:0.5px solid #ccc;border-radius:6px;background:#fff;color:#111;flex:1;}
@media print{

  .app{max-width:100%;padding:0;background:#fff;}
  .tbl-wrap{border:1px solid #ccc;border-radius:0;}
  .modal-bg{display:none!important;}
  body{font-size:11px;background:#fff;}
}
</style></head><body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjLTpjLrwH3qcXF8BqXFYn-NqdWVZVkc8",
  authDomain: "kanri-nisshi.firebaseapp.com",
  databaseURL: "https://kanri-nisshi-default-rtdb.firebaseio.com",
  projectId: "kanri-nisshi",
  storageBucket: "kanri-nisshi.firebasestorage.app",
  messagingSenderId: "208289949064",
  appId: "1:208289949064:web:2d197616c79ce34f0dc63d"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── 祝日 ──────────────────────────────────
let holidaySet = new Set([
  "2025-01-01","2025-01-13","2025-02-11","2025-02-23","2025-02-24",
  "2025-03-20","2025-04-29","2025-05-03","2025-05-04","2025-05-05",
  "2025-05-06","2025-07-21","2025-08-11","2025-09-15","2025-09-23",
  "2025-10-13","2025-11-03","2025-11-23","2025-11-24",
  "2026-01-01","2026-01-12","2026-02-11","2026-02-23","2026-03-20",
  "2026-04-29","2026-05-03","2026-05-04","2026-05-05","2026-05-06",
  "2026-07-20","2026-08-11","2026-09-21","2026-09-22","2026-09-23",
  "2026-10-12","2026-11-03","2026-11-23","2026-12-23",
]);
let holidayUpdatedAt="内蔵データ（2025-2026）";

function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isHalfDayOnly(){const d=new Date();return d.getDay()===6||holidaySet.has(todayStr());}

async function fetchHolidays(){
  const btn=document.getElementById("btn-fetch-holidays");
  const statusEl=document.getElementById("hu-status");
  btn.disabled=true;btn.textContent="取得中...";
  statusEl.className="hu-status loading";statusEl.textContent="内閣府サーバーに接続中...";
  try{
    const res=await fetch("https://corsproxy.io/?"+encodeURIComponent("https://www8.cao.go.jp/chosei/shukujitsu/syukujitsu.csv"),{signal:AbortSignal.timeout(10000)});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const text=new TextDecoder("shift-jis").decode(await res.arrayBuffer());
    const newSet=new Set();let count=0;
    for(const line of text.split(/\r?\n/).filter(l=>l.trim())){
      const m=line.split(",")[0].trim().match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
      if(!m)continue;
      newSet.add(`${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`);count++;
    }
    if(count<10)throw new Error("データが少なすぎます");
    holidaySet=newSet;
    const now=new Date();
    holidayUpdatedAt=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    document.getElementById("holiday-count-label").textContent=`${count}件の祝日を読み込み済み`;
    document.getElementById("holiday-updated-at").textContent=holidayUpdatedAt;
    statusEl.className="hu-status ok";statusEl.textContent=`✓ 更新完了！ ${count}件取得しました`;
    render();
  }catch(e){statusEl.className="hu-status err";statusEl.textContent=`✗ 取得失敗：${e.message}`;}
  finally{btn.disabled=false;btn.textContent="🔄 今すぐ更新";}
}

// ── デフォルトデータ ───────────────────────
const DEFAULT_WORK_TYPES=[
  {id:"none",name:"―",color:"transparent",textColor:"#888"},
  {id:"park",name:"公園",color:"#C0DD97",textColor:"#27500A"},
  {id:"flower",name:"造花",color:"#F4C0D1",textColor:"#72243E"},
  {id:"wire",name:"鉄線",color:"#B5D4F4",textColor:"#0C447C"},
  {id:"factory",name:"工場",color:"#FAC775",textColor:"#633806"},
  {id:"grass",name:"草刈",color:"#9FE1CB",textColor:"#085041"},
];
// 職員用作業種類（造花・鉄線の代わりに事業所内）
const DEFAULT_STAFF_WORK_TYPES=[
  {id:"none",name:"―",color:"transparent",textColor:"#888"},
  {id:"park",name:"公園",color:"#C0DD97",textColor:"#27500A"},
  {id:"office",name:"事業所内",color:"#F4C0D1",textColor:"#72243E"},
  {id:"factory",name:"工場",color:"#FAC775",textColor:"#633806"},
  {id:"grass",name:"草刈",color:"#9FE1CB",textColor:"#085041"},
];
const DEFAULT_GRASS=["和田島","高架下","ナノミスト","応神","小松島宿舎"];
const DEFAULT_STAFF=["福山","上井","新川"];
const DEFAULT_MEMBERS=["大津 英明","新居 修","井上 優子","中村 初美","岩谷 忠明","黒川 智広","菖蒲 健太郎","西岡 昌哉","川田 公昭","大宗 秀剛","木内 裕之"];

let workTypes=[...DEFAULT_WORK_TYPES];
let staffWorkTypes=[...DEFAULT_STAFF_WORK_TYPES];
let grassLocations=[...DEFAULT_GRASS];
let members=[];
let staffMembers=[];
let editingId=null,editingStaffId=null;
let nextId=500;
let fbReady=false;

const rootRef=ref(db,"kanri");
const syncBar=document.getElementById("sync-bar");

onValue(rootRef,(snapshot)=>{
  const data=snapshot.val();
  if(!data){
    const initMembers=DEFAULT_MEMBERS.map((name,i)=>({id:i,name,isStaff:false,status:"attend",amWork:"none",amLoc:"",pmWork:"none",pmLoc:""}));
    const initStaff=DEFAULT_STAFF.map((name,i)=>({id:100+i,name,isStaff:true,status:"attend",amWork:"none",amLoc:"",pmWork:"none",pmLoc:""}));
    set(rootRef,{workTypes:DEFAULT_WORK_TYPES,staffWorkTypes:DEFAULT_STAFF_WORK_TYPES,grassLocations:DEFAULT_GRASS,members:initMembers,staffMembers:initStaff});
    return;
  }
  workTypes=data.workTypes||[...DEFAULT_WORK_TYPES];
  staffWorkTypes=data.staffWorkTypes||[...DEFAULT_STAFF_WORK_TYPES];
  grassLocations=data.grassLocations||[...DEFAULT_GRASS];
  members=(data.members||[]).filter(Boolean);
  staffMembers=(data.staffMembers||[]).filter(Boolean);
  fbReady=true;
  syncBar.className="sync-bar sync-ok no-print";

  syncBar.textContent="✗ 接続エラー — オフラインの可能性があります";
});

const USER_STATUS_NORMAL=[{v:"attend",label:"出席"},{v:"half-am",label:"半日（午前のみ）"},{v:"half-pm",label:"半日（午後のみ）"},{v:"absent",label:"欠席"}];
const USER_STATUS_HALFDAY=[{v:"attend",label:"出席（午前）"},{v:"absent",label:"欠席"}];
// 職員：出勤と休の二択
const STAFF_STATUS_NORMAL=[{v:"attend",label:"出勤"},{v:"half-am",label:"半日（午前のみ）"},{v:"half-pm",label:"半日（午後のみ）"},{v:"absent",label:"休"}];
const STAFF_STATUS_HALFDAY=[{v:"attend",label:"出勤（午前）"},{v:"absent",label:"休"}];

const USER_BADGE={attend:"background:#EAF3DE;color:#3B6D11;",absent:"background:#F7C1C1;color:#791F1F;","half-am":"background:#E1F5EE;color:#0F6E56;","half-pm":"background:#E6F1FB;color:#185FA5;"};
const USER_BADGE_LABEL={attend:"出席",absent:"欠席","half-am":"午前","half-pm":"午後"};
const STAFF_BADGE={attend:"background:#E6F1FB;color:#185FA5;",absent:"background:#F7C1C1;color:#791F1F;","half-am":"background:#E1F5EE;color:#0F6E56;","half-pm":"background:#EEEDFE;color:#3C3489;"};
// 職員バッジ：欠勤→休
const STAFF_BADGE_LABEL={attend:"出勤",absent:"休","half-am":"午前","half-pm":"午後"};

function contrastText(hex){
  if(!hex||hex==="transparent")return"#666";
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(r*299+g*587+b*114)/1000>128?"#1a1a1a":"#f5f5f5";
}
function todayLabel(){
  const d=new Date();
  const wd=["日","月","火","水","木","金","土"][d.getDay()];
  let s=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${wd}）`;
  if(holidaySet.has(todayStr()))s+=" 祝日";return s;
}

// 名前横のドット（午前の作業色）
function workDotHTML(wid, wTypes){
  const w=wTypes.find(x=>x.id===wid);
  if(!w||w.id==="none"||w.color==="transparent")return"";
  return`<span class="work-dot" style="background:${w.color};border:1px solid ${w.textColor}55"></span>`;
}

function wCellHTML(wid,loc,status,period,isStaff){
  const wTypes=isStaff?staffWorkTypes:workTypes;
  const hd=isHalfDayOnly();
  if(hd&&period==="pm")return`<span class="wc" style="color:#ccc;font-size:10px">閉所</span>`;
  if(status==="absent")return`<span class="wc" style="background:#F7C1C1;color:#791F1F">${isStaff?"休":"欠席"}</span>`;
  if(status==="half-am"&&period==="pm")return`<span class="wc" style="background:#FAEEDA;color:#854F0B">―</span>`;
  if(status==="half-pm"&&period==="am")return`<span class="wc" style="background:#FAEEDA;color:#854F0B">―</span>`;
  const w=wTypes.find(x=>x.id===wid)||wTypes[0];
  if(!wid||wid==="none")return`<span class="wc" style="color:#aaa">―</span>`;
  let txt=w.name;
  if(w.name==="草刈"&&loc)txt+=`<br><span style="font-size:9px">${loc}</span>`;
  return`<span class="wc" style="background:${w.color};color:${w.textColor}">${txt}</span>`;
}



function render(){
  const hd=isHalfDayOnly();
  const banner=document.getElementById("holiday-banner");
  if(hd){banner.style.display="block";banner.textContent=new Date().getDay()===6?"本日は土曜日のため午前のみ開所です":"本日は祝日のため午前のみ開所です";}
  else banner.style.display="none";
  document.getElementById("pm-header").textContent=hd?"午後(閉所)":"午後";
  document.getElementById("pm-header").style.color=hd?"#ccc":"";
  const att=members.filter(m=>m.status!=="absent").length;
  const abs=members.filter(m=>m.status==="absent").length;
  document.getElementById("stats").innerHTML=
    `<div class="sc at">出席 <b>${att}</b>名</div><div class="sc ab">欠席 <b>${abs}</b>名</div><div class="sc tt">登録 <b>${members.length}</b>名</div>`;
  document.getElementById("legend").innerHTML=
    workTypes.filter(w=>w.id!=="none").map(w=>`<div class="lg"><div class="lgd" style="background:${w.color};border:0.5px solid ${w.textColor}44"></div>${w.name}</div>`).join("")+
    `<div class="lg"><div class="lgd" style="background:#F7C1C1"></div>欠席</div>`+
    (!hd?`<div class="lg"><div class="lgd" style="background:#FAEEDA"></div>半日</div>`:"");

  let rows=`<tr class="divider"><td colspan="6">利用者（${members.length}名）</td></tr>`;
  members.forEach((m,i)=>{
    const isAbs=m.status==="absent";
    const dot=workDotHTML(m.amWork,workTypes);
    rows+=`<tr class="${isAbs?"row-abs":""}" data-id="${m.id}" data-type="user">
      <td class="td-no">${i+1}</td>
      <td style="text-align:center;padding:0 1px">${dot}</td>
      <td class="td-name">${m.name}</td>
      <td><span class="status-badge" style="${USER_BADGE[m.status]||USER_BADGE.attend}">${USER_BADGE_LABEL[m.status]||"出席"}</span></td>
      <td>${wCellHTML(m.amWork,m.amLoc,m.status,"am",false)}</td>
      <td>${wCellHTML(m.pmWork,m.pmLoc,m.status,"pm",false)}</td>
    </tr>`;
  });

  rows+=`<tr class="divider"><td colspan="6">職員（${staffMembers.length}名）</td></tr>`;
  staffMembers.forEach(m=>{
    const isAbs=m.status==="absent";
    const sdot=workDotHTML(m.amWork,staffWorkTypes);
    rows+=`<tr class="${isAbs?"row-abs":""}" data-id="${m.id}" data-type="staff">
      <td class="td-no"></td>
      <td style="text-align:center;padding:0">${sdot}</td>
      <td class="td-sname">${m.name}</td>
      <td><span class="status-badge" style="${STAFF_BADGE[m.status]||STAFF_BADGE.attend}">${STAFF_BADGE_LABEL[m.status]||"出勤"}</span></td>
      <td>${wCellHTML(m.amWork,m.amLoc,m.status,"am",true)}</td>
      <td>${wCellHTML(m.pmWork,m.pmLoc,m.status,"pm",true)}</td>
    </tr>`;
  });

  const tbody=document.getElementById("tbody");
  tbody.innerHTML=rows;
  tbody.querySelectorAll("tr[data-id]").forEach(tr=>{
    tr.addEventListener("click",()=>{
      tr.dataset.type==="staff"?openStaffEdit(+tr.dataset.id):openEdit(+tr.dataset.id);
    });
  });
}

function buildWorkOpts(sel,wTypes){return wTypes.map(w=>`<option value="${w.id}"${w.id===sel?" selected":""}>${w.name}</option>`).join("");}
function buildLocOpts(sel){return grassLocations.map(l=>`<option value="${l}"${l===sel?" selected":""}>${l}</option>`).join("");}
function buildStatusOpts(list,sel){return list.map(s=>`<option value="${s.v}"${s.v===sel?" selected":""}>${s.label}</option>`).join("");}

function isGrassWork(wid,wTypes){return(wTypes.find(w=>w.id===wid)||{}).name==="草刈";}

function toggleGrass(){
  document.getElementById("f-am-loc-wrap").style.display=isGrassWork(document.getElementById("f-am-work").value,workTypes)?"block":"none";
  document.getElementById("f-pm-loc-wrap").style.display=isGrassWork(document.getElementById("f-pm-work").value,workTypes)?"block":"none";
}
function togglePm(){
  const st=document.getElementById("f-status").value;
  document.getElementById("f-pm-section").style.display=(isHalfDayOnly()||st==="half-am"||st==="absent")?"none":"block";

function onAmWorkChange(){
  const amVal=document.getElementById("f-am-work").value;

}

function openEdit(id){
  editingId=id;

document.getElementById("btn-csv").addEventListener("click",()=>{
  const hd=isHalfDayOnly();
  const wn=(id,wt)=>(wt.find(w=>w.id===id)||wt[0]).name;
  const header=hd?["氏名","種別","状況","午前作業","午前場所"]:["氏名","種別","状況","午前作業","午前場所","午後作業","午後場所"];

function renderSettings(){
  document.getElementById("holiday-count-label").textContent=`${holidaySet.size}件の祝日を読み込み済み`;
  document.getElementById("holiday-updated-at").textContent=holidayUpdatedAt;

  document.getElementById("work-type-list").innerHTML=workTypes.filter(w=>w.id!=="none").map((w,i)=>
    `<div class="row-item">
      <div style="width:14px;height:14px;border-radius:3px;background:${w.color};border:0.5px solid ${w.textColor}44;flex-shrink:0"></div>
      <span>${w.name}</span>
      <input type="color" value="${w.color==="transparent"?"#cccccc":w.color}" data-wi="${i+1}" style="width:22px;height:20px;border:none;padding:0;cursor:pointer;border-radius:3px;">
      <button class="idel" data-wdel="${i+1}">×</button>
    </div>`).join("");

  document.getElementById("grass-tag-list").innerHTML=grassLocations.map((l,i)=>
    `<div class="tag-item">${l}<button class="tag-del" data-gi="${i}">×</button></div>`).join("");

  document.getElementById("user-list-s").innerHTML=members.map((m,i)=>
    `<div class="row-item">
      <span>${i+1}. ${m.name}</span>
      <button class="imove" data-uup="${i}" title="上へ" ${i===0?"disabled":""}>▲</button>
      <button class="imove" data-udown="${i}" title="下へ" ${i===members.length-1?"disabled":""}>▼</button>
      <button class="idel" data-udel="${i}">×</button>
    </div>`).join("");

  document.getElementById("staff-list-s").innerHTML=staffMembers.map((m,i)=>
    `<div class="row-item"><span>${m.name}</span><button class="idel" data-sdel="${i}">×</button></div>`).join("");

  buildInsertPosSelect();

  document.querySelectorAll("[data-wi]").forEach(inp=>{inp.addEventListener("change",()=>{workTypes[+inp.dataset.wi].color=inp.value;workTypes[+inp.dataset.wi].textColor=contrastText(inp.value);saveAll();renderSettings();});});
  document.querySelectorAll("[data-wdel]").forEach(b=>b.addEventListener("click",()=>{if(!confirm(`「${workTypes[+b.dataset.wdel]?.name}」を削除しますか？`))return;workTypes.splice(+b.dataset.wdel,1);saveAll();renderSettings();}));
  document.querySelectorAll(".tag-del").forEach(b=>b.addEventListener("click",()=>{if(!confirm(`「${grassLocations[+b.dataset.gi]}」を削除しますか？`))return;grassLocations.splice(+b.dataset.gi,1);saveAll();renderSettings();}));
  document.querySelectorAll("[data-uup]").forEach(b=>b.addEventListener("click",()=>{
    const i=+b.dataset.uup;if(i===0)return;
    [members[i-1],members[i]]=[members[i],members[i-1]];saveAll();renderSettings();
  }));
  document.querySelectorAll("[data-udown]").forEach(b=>b.addEventListener("click",()=>{
    const i=+b.dataset.udown;if(i>=members.length-1)return;
    [members[i],members[i+1]]=[members[i+1],members[i]];saveAll();renderSettings();
  }));
  document.querySelectorAll("[data-udel]").forEach(b=>b.addEventListener("click",()=>{if(!confirm(`「${members[+b.dataset.udel]?.name}」を削除しますか？`))return;members.splice(+b.dataset.udel,1);saveAll();renderSettings();}));
  document.querySelectorAll("[data-sdel]").forEach(b=>b.addEventListener("click",()=>{if(!confirm(`「${staffMembers[+b.dataset.sdel]?.name}」を削除しますか？`))return;staffMembers.splice(+b.dataset.sdel,1);saveAll();renderSettings();}));
}

document.getElementById("new-work-name").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("add-work-btn").click();});

document.getElementById("add-loc-btn").addEventListener("click",()=>{
  const v=document.getElementById("new-loc-input").value.trim();
  if(v&&!grassLocations.includes(v)){grassLocations.push(v);document.getElementById("new-loc-input").value="";saveAll();renderSettings();}
});
document.getElementById("new-loc-input").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("add-loc-btn").click();});

document.getElementById("add-user-btn").addEventListener("click",()=>{
  const v=document.getElementById("new-user-input").value.trim();
  if(!v)return;
  if(members.length>=30){alert("利用者は30名までです");return;}
  const pos=+document.getElementById("insert-pos-select").value;
  members.splice(pos,0,{id:nextId++,name:v,isStaff:false,status:"attend",amWork:"none",amLoc:"",pmWork:"none",pmLoc:""});
  document.getElementById("new-user-input").value="";saveAll();renderSettings();
});
document.getElementById("new-user-input").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("add-user-btn").click();});

document.getElementById("add-staff-btn").addEventListener("click",()=>{
  const v=document.getElementById("new-staff-input").value.trim();
  if(!v)return;
  staffMembers.push({id:nextId++,name:v,isStaff:true,status:"attend",amWork:"none",amLoc:"",pmWork:"none",pmLoc:""});
  document.getElementById("new-staff-input").value="";saveAll();renderSettings();
});
document.getElementById("new-staff-input").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("add-staff-btn").click();});

document.getElementById("today-label").textContent=todayLabel();
</script>
</body></html>
